<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8" />
    <link
      rel="stylesheet"
      type="text/css"
      href="@/resources/html/help/help.css"
    />
  </head>

  <body>
    <div class="body-top"></div>
    {{each body val}}
    <div class="body-point">
      <div class="body-point-font">{{val.group}}</div>
    </div>
    {{each val.list item}}
    <div class="body-box">
      <div class="body-box-font-title">{{item.dsc}}</div>
      <div class="body-box-font-desc">{{item.doc}}</div>
    </div>
    {{/each}} {{/each}}
    <div class="body-buttom"></div>
  </body>

  <style>
    .body-top {
      height: 480px;
      background: url('@/resources/img/help/top.jpg');
      background-size: 100% 100%;
    }

    .body-point {
      height: 100px;
      background: url('@/resources/img/help/point.jpg');
      background-size: 100% 100%;
    }

    .body-box {
      height: 190px;
      background: url('@/resources/img/help/box.jpg');
      background-size: 100% 100%;
    }

    .body-buttom {
      height: 120px;
      background: url('@/resources/img/help/buttom.jpg');
      background-size: 100% 100%;
    }
  </style>
</html>
